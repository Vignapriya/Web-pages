<html>
<head>
<title>Registration form</title>
</head>
<body>
<center>
<h2 style="color:purple"><u>Personal Details</u></h2>
<form>
<label for="fname">First Name:</label>
<input type="text" id="fname" name="fname" value=" "><br><br>

<label for="lname">Last Name:</label>
<input type="text" id="lname" name="lname" value=" "><br><br>

<label for="DOB">Date of birth:</label>
<input type="date" id="DOB" name="DOB" value=" "><br><br>

<label for="gender">Gender:</label>
<select name="gender" id="gender">
<option value="Male">Male</option>
<option value="Female">Female</option>
<option value="Other">Other</option>
</select>
<br>
<br>

<label for="age">Age:</label>
<input type="number" id="age' name="age" value=" "><br><br>
<label for="email">E-mail:</label>
<input type="email" id="email" name="email" value=" "><br><br>

<br><label>Your preferred skills:</label><br>

<input type="radio" id="skill_java" name="skills" value="Java">
<label for="skill_java">Java</label>

<input type="radio" id="skill_python" name="skills" value="Python">
<label for="skill_python">Python</label>
<input type="radio" id="skill_web" name="skills" value="web development">
<label for="skill_web">Web development</label><br><br>

<p>Your preferred hobbies:</p>
<input type="checkbox" id="hobbies_singing" name="hobbies" value="singing">
<label for="hobbies_singing">Singing</label><br>
<input type="checkbox" id="hobbies_dance" name="hobbies" value="dance">
<label for="hobbies_dance">Dancing</label><br>
<input type="checkbox" id="hobbies_reading" name="hobbies" value"reading">
<label for="hobbies_reading">Reading</label>
</center>
<br>
<br>
<center>
<input type="submit" value="submit">
</center>
</form>
</body>
</html>
